# Fly.io configuration for Bridgeway Developers
app = "bridgeway-developers-n9ggda"
primary_region = "sin"

[build]

[env]
  PORT = "8080"
  STATE_DIR = "/data"
  UPLOAD_DIR = "/data/uploads"

[http_service]
  internal_port = 8080
  force_https = true
  # Stateful app: keep it always running so the idle stop/start never risks data.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

# Persistent volume — keeps your published content + uploaded photos/videos
[[mounts]]
  source = "bridgeway_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
