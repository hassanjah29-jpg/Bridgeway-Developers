name: Deploy to Fly.io

# Auto-deploys to Fly.io on every push to main; also manually triggerable.
on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group   # prevents overlapping deploys
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      # A file-backed CMS runs ONE machine with ONE persistent volume.
      # Create the volume automatically if it doesn't already exist.
      - name: Ensure the data volume exists
        run: |
          have=$(flyctl volumes list --json | jq '[.[] | select(.name=="bridgeway_data")] | length')
          echo "Existing bridgeway_data volumes: $have"
          if [ "$have" -lt 1 ]; then
            echo "Creating volume bridgeway_data in sin..."
            flyctl volumes create bridgeway_data --region sin --count 1 --yes
          fi

      # Give the volume room for videos (grow to 3GB; free allowance covers it).
      - name: Ensure volume is at least 3GB
        run: |
          info=$(flyctl volumes list --json)
          vid=$(echo "$info" | jq -r '[.[] | select(.name=="bridgeway_data")][0].id')
          sz=$(echo "$info" | jq -r '[.[] | select(.name=="bridgeway_data")][0].size_gb // 0')
          echo "volume=$vid size=${sz}GB"
          if [ "$vid" != "null" ] && [ -n "$vid" ] && [ "${sz%.*}" -lt 3 ]; then
            flyctl volumes extend "$vid" --size 3 || flyctl volume extend "$vid" -s 3 || true
          fi

      # Keep the app at a single machine so it needs only one volume.
      - name: Scale to one machine
        run: flyctl scale count 1 --yes

      # Build the image LOCALLY on the GitHub runner (which has Docker) and push
      # it to Fly's registry. This bypasses Fly's remote "depot builder", which
      # has been unreachable ("Waiting for depot builder..." -> context deadline
      # exceeded) and was the real cause of the 10-minute hangs. 'immediate'
      # replaces the single machine directly instead of a slow health-check wait.
      - name: Deploy
        run: flyctl deploy --local-only --ha=false --strategy immediate --wait-timeout 180

      # Print live state so we can confirm the volume is attached to the machine.
      - name: Diagnostics (volumes + machines)
        if: always()
        run: |
          echo "===== VOLUMES ====="; flyctl volumes list || true
          echo "===== MACHINES ====="; flyctl machine list || true
          echo "===== STATUS ====="; flyctl status || true

      # Fetch the LIVE homepage and report exactly what the running server sends
      # (HTTP status, cache header, and which logo path is embedded). This is the
      # ground truth for what a browser receives.
      - name: Verify live homepage
        if: always()
        run: |
          sleep 15
          URL="https://bridgeway-developers-n9ggda.fly.dev/"
          echo "GET $URL"
          code=$(curl -s -o live.html -w "%{http_code}" "$URL" || echo 000)
          echo "HTTP status: $code"
          echo "--- cache-control header ---"
          curl -sI "$URL" | grep -i "cache-control" || echo "(none)"
          echo "--- logo path marker in served HTML ---"
          if grep -oq 'd="M 76 28.905' live.html; then
            echo "OPEN-W logo IS being served (new traced path)."
          elif grep -oq 'd="M 57.500 22.959' live.html; then
            echo "OLD filled logo is still being served."
          else
            echo "logo path marker not found; first nav-logo snippet:"
            grep -o 'nav-logo[^>]*' live.html | head -1 || true
          fi
