name: Deploy to Fly.io

# Auto-deploys to Fly.io on every push to main.
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group   # prevents overlapping deploys
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      # A file-backed CMS runs ONE machine with ONE persistent volume.
      # Create the volume automatically if it doesn't already exist.
      - name: Ensure the data volume exists
        run: |
          have=$(flyctl volumes list --json | jq '[.[] | select(.name=="bridgeway_data")] | length')
          echo "Existing bridgeway_data volumes: $have"
          if [ "$have" -lt 1 ]; then
            echo "Creating volume bridgeway_data in sin..."
            flyctl volumes create bridgeway_data --region sin --count 1 --yes
          fi

      # Keep the app at a single machine so it needs only one volume.
      - name: Scale to one machine
        run: flyctl scale count 1 --yes

      - name: Deploy
        run: flyctl deploy --remote-only --ha=false

      # Print live state so we can confirm the volume is attached to the machine.
      - name: Diagnostics (volumes + machines)
        if: always()
        run: |
          echo "===== VOLUMES ====="; flyctl volumes list || true
          echo "===== MACHINES ====="; flyctl machine list || true
          echo "===== STATUS ====="; flyctl status || true
