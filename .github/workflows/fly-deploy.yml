name: Deploy to Fly.io

# Auto-deploys to Fly.io on every push to the deploy branch.
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group   # prevents overlapping deploys
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # --ha=false runs a single machine (a CMS must not split content
      # across machines). Scale to 1 first so the deploy needs only 1 volume.
      - run: flyctl scale count 1 --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
